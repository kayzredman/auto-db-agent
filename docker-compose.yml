services:
  internal-metrics-db:
    image: postgres:16-alpine
    container_name: auto-dba-metrics-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${METRICS_DB_NAME}
      POSTGRES_USER: ${METRICS_DB_USER}
      POSTGRES_PASSWORD: ${METRICS_DB_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${METRICS_DB_PORT}:5432"
    volumes:
      - metrics_db_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METRICS_DB_USER} -d ${METRICS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  metrics_db_data:
